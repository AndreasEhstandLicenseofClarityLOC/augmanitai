    description: >
      Scholarly terminology database defining ~120 terms across 6 domains
      covering meta-cognitive, compound cognition, multi-agent, collective
      intelligence, and prompt-ontology bridge phenomena in human-AI
      interaction. Ships with Python/NPM packages, MCP/A2A/ANP/AG-UI protocol
      servers, SPARQL/SHACL/TBX/JSON-LD exports, GraphRAG variants, and
      deployment configurations.

